<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>
  <div class="wrapper">
    <form id="password_check" action="http://fe.it-academy.by/TestForm.php" method="GET" target="_blank">
      <fieldset>
        <legend>Тестовая форма для проверки пароля</legend>
        <div>
          <input id="pass_1" type="password" name="user_password_1" autocomplete="off" required>
          <label for="pass_1">Введите пароль</label>
        </div>
        <div>
          <input id="pass_2" type="password" name="user_password_2" autocomplete="off" required>
          <label for="pass_2">Повторите пароль</label>
        </div>
        <div>
          <button class="send_data" type="submit" disabled>Отправить данные</button>
          <button class="cons_log" type="button">Отправить в конссоль</button>
        </div>
      </fieldset>
    </form>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
<script src="script.js"></script>
</body>
</html>
